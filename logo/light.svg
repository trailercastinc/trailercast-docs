<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <!-- TrailerCast lockup — light mode (dark wordmark on light backgrounds).
       Mark = flat lavender-purple rounded square with the white
       target / crosshair reticle: outer ring, inner filled dot, and
       4 spoke ticks that span across the ring at the cardinal points
       (extending from outside the ring through to the area between
       the ring and the inner dot). Wordmark "TrailerCast" + a
       superscript TM. Designed to read at the typical Mintlify nav
       height (~36px) without crowding. -->

  <!-- Mark: flat purple square (no gradient — matches the wordmark
       art Daniel attached). #8e87f0 ≈ Tailwind indigo-400 / lavender. -->
  <rect x="4" y="4" width="82" height="82" rx="20" fill="#8e87f0"/>

  <!-- Outer ring -->
  <circle cx="45" cy="45" r="23" stroke="#ffffff" stroke-width="3.6" fill="none"/>

  <!-- Inner filled dot — smaller than the previous draft so the
       ratio matches the source art. -->
  <circle cx="45" cy="45" r="6" fill="#ffffff"/>

  <!-- 4 spoke ticks. Each one spans the outer ring at a cardinal
       point: ~8 units outside the ring + ~9 units inside, with a
       gap remaining between the tick's inner end and the central
       dot (so the dot reads as a separate element). -->
  <path d="M45 14 L45 32" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M45 58 L45 76" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M14 45 L32 45" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M58 45 L76 45" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>

  <!-- Wordmark + TM -->
  <text x="106" y="62"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="48"
        letter-spacing="-1.2"
        fill="#0f172a">TrailerCast</text>
  <text x="338" y="34"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="600"
        font-size="14"
        fill="#0f172a">™</text>
</svg>
