<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <!-- TrailerCast lockup — light mode (dark wordmark on light backgrounds).
       Mark on the left = purple gradient rounded square with white target /
       crosshair. Wordmark "TrailerCast" + superscript TM beside it. Designed
       to read at the typical Mintlify nav height (~36px) without crowding. -->
  <defs>
    <linearGradient id="tc-bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c7df3"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Mark -->
  <rect x="4" y="4" width="82" height="82" rx="20" fill="url(#tc-bg-light)"/>
  <circle cx="45" cy="45" r="22" stroke="#ffffff" stroke-width="3.5" fill="none"/>
  <circle cx="45" cy="45" r="8" fill="#ffffff"/>
  <path d="M45 12 L45 22" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M45 68 L45 78" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M12 45 L22 45" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M68 45 L78 45" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wordmark + TM -->
  <text x="106" y="62"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="48"
        letter-spacing="-1.2"
        fill="#0f172a">TrailerCast</text>
  <text x="338" y="34"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="600"
        font-size="14"
        fill="#0f172a">™</text>
</svg>
