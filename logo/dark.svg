<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <!-- TrailerCast lockup — dark mode (white wordmark on dark backgrounds).
       Same flat-purple mark as light.svg; only the wordmark color
       changes so the icon stays high-contrast against either theme. -->

  <!-- Mark -->
  <rect x="4" y="4" width="82" height="82" rx="20" fill="#8e87f0"/>
  <circle cx="45" cy="45" r="23" stroke="#ffffff" stroke-width="3.6" fill="none"/>
  <circle cx="45" cy="45" r="6" fill="#ffffff"/>
  <path d="M45 14 L45 32" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M45 58 L45 76" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M14 45 L32 45" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
  <path d="M58 45 L76 45" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>

  <!-- Wordmark + TM (white for dark mode) -->
  <text x="106" y="62"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="48"
        letter-spacing="-1.2"
        fill="#ffffff">TrailerCast</text>
  <text x="338" y="34"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-weight="600"
        font-size="14"
        fill="#ffffff">™</text>
</svg>
