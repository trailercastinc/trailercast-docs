<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- TrailerCast target / reticle mark on a flat lavender-purple
       rounded square. Matches the light/dark logo lockups in
       /logo/{light,dark}.svg. The mark is slightly inset (r=14 vs
       the in-app r=20) so it reads cleanly at 16x16 in the browser
       tab bar — the full-size mark would touch the corners and
       lose its silhouette when downscaled. Spoke ticks span across
       the outer ring (outside through to the area between ring and
       inner dot), matching the source art. -->
  <rect width="48" height="48" rx="10" fill="#8e87f0"/>
  <circle cx="24" cy="24" r="14" stroke="#ffffff" stroke-width="2.4" fill="none"/>
  <circle cx="24" cy="24" r="3.6" fill="#ffffff"/>
  <path d="M24 7 L24 17" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M24 31 L24 41" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M7 24 L17 24" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  <path d="M31 24 L41 24" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
</svg>
