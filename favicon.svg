<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- TrailerCast broadcast / target mark on a rounded purple gradient.
       Mark inset slightly (r=14 vs the in-app r=20) so it reads cleanly at
       16x16 in the browser tab. Matches frontend/public/favicon.svg so the
       app + docs share an identical tab icon. -->
  <defs>
    <linearGradient id="tc-fav" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c7df3"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="10" fill="url(#tc-fav)"/>
  <circle cx="24" cy="24" r="14" stroke="#ffffff" stroke-width="2.25" fill="none"/>
  <circle cx="24" cy="24" r="5" fill="#ffffff"/>
  <path d="M24 6 L24 11" stroke="#ffffff" stroke-width="2.25" stroke-linecap="round"/>
  <path d="M24 37 L24 42" stroke="#ffffff" stroke-width="2.25" stroke-linecap="round"/>
  <path d="M6 24 L11 24" stroke="#ffffff" stroke-width="2.25" stroke-linecap="round"/>
  <path d="M37 24 L42 24" stroke="#ffffff" stroke-width="2.25" stroke-linecap="round"/>
</svg>
